<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Login</h2>
    
    <form id="loginForm">
        <input type="email" placeholder="Email" id="email" required>
        <input type="password" placeholder="Password" id="password" required>
        <button type="submit">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
